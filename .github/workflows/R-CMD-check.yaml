# R CMD check + test coverage on Ubuntu, macOS, and Windows.
# tbl.now is a GitHub-only dependency: it is installed automatically by
# setup-r-dependencies (pak) from the `Remotes:` field in DESCRIPTION
# (RodrigoZepeda/tbl.now).
# The heavy RTMB / BLAS dependencies are cached between runs.

on:
  push:
    branches: [master]
    paths-ignore:      
      - 'pkgdown/**'
      - '_pkgdown.yml'
      - '.github/**'
      - 'README.md'
      - 'README.Rmd'
      - 'SKILL.md'
      - '*.Rproj'
      - 'Dockerfile'
      - 'codecov.yml'
      - '.gitignore'
      - 'devel/**'
      - 'pkgdown/**'
      - 'inst/figures/hex.png'
  pull_request:
    branches: [master]
    paths-ignore:      
      - 'pkgdown/**'
      - '_pkgdown.yml'
      - '.github/**'
      - 'README.md'
      - 'README.Rmd'
      - 'SKILL.md'
      - '*.Rproj'
      - 'Dockerfile'
      - 'codecov.yml'
      - '.gitignore'
      - 'devel/**'
      - 'pkgdown/**'
      - 'inst/figures/hex.png'

name: R-CMD-check.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: >-
            https://epinowcast.r-universe.dev,
            https://kaskr.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::covr
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          args: 'c("--no-manual", "--ignore-vignettes", "--as-cran")'

  coverage:
    runs-on: ubuntu-latest
    needs: R-CMD-check
    # Run on a push to the default branch (this repo uses `master`; `main` kept
    # in case the default is renamed) so Codecov always gets a fresh report.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # covr::codecov() reads this automatically. Tokenless upload works for
      # public repos, but adding a CODECOV_TOKEN repo secret makes it reliable.
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: >-
            https://epinowcast.r-universe.dev,
            https://kaskr.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
          needs: coverage

      - name: Test coverage
        run: |
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

      - name: Show testthat output on failure
        if: always()
        run: |
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash
