url: https://rodrigozepeda.github.io/diseasenowcasting/

home:
  title: diseasenowcasting — Bayesian Epidemic Nowcasting
  description: >
    Nowcast time series of epidemiological cases using a censored-regression
    approach with RTMB.

template:
  bootstrap: 5
  includes:
    in_header: pkgdown/extra.css
  math-rendering: katex
  bslib:
    bootswatch: flatly
    primary: "#5F7E62"      # dark sage green
    secondary: "#A8BFA9"    # light sage
    success: "#5F7E62"
    danger: "#B85348"       # desaturated red
    dark: "#262626"         # charcoal

navbar:
  structure:
    left:  [get_started, reference, articles, news]
    right: [search, github]

  components:
    get_started:
      text: Get started
      href: articles/introduction.html
    github:
      icon: fab fa-github
      href: https://github.com/RodrigoZepeda/diseasenowcasting
      aria-label: GitHub

articles:
  - title: Get started
    contents:
      - introduction
  
  - title: Methodology
    contents:
      - Mathematics
      - Understanding_Priors
      - Handling_Outlier_Delays_with_Censoring

  - title: Applications
    contents:
      - Nowcasting_at_the_start_of_an_Epidemic
      - Benchmark

  - title: Miscellaneous
    contents:
      - LLM_Usage