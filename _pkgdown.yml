url: https://rodrigozepeda.github.io/diseasenowcasting/

home:
  title: diseasenowcasting — Bayesian Epidemic Nowcasting
  description: >
    Nowcast time series of epidemiological cases using a censored-regression
    approach with RTMB (no Stan required).

template:
  bootstrap: 5
  includes:
    in_header: pkgdown/extra.css
  math-rendering: katex
  bslib:
    primary: "#5F7E62"      # dark sage green
    secondary: "#A8BFA9"    # light sage
    success: "#5F7E62"
    danger: "#B85348"       # desaturated red
    dark: "#262626"         # charcoal

navbar:
  structure:
    left:  [articles, reference, news]
    right: [search, github]
  articles:
  - title: Get started
    contents:
      - introduction
  components:
    github:
      icon: fab fa-github
      href: https://github.com/RodrigoZepeda/diseasenowcasting
      aria-label: GitHub

